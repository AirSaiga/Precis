version: 2
id: products
name: products
description: 产品表
source:
  mode: relative_file
  path: data/products.csv
columns:
  - {id: product_id, name: product_id, type: integer, primary_key: true, nullable: false}
  - {id: product_name, name: product_name, type: string}
  - {id: price, name: price, type: decimal}
  - {id: stock, name: stock, type: integer}
constraints:
  - id: prod_price_range
    type: Range
    column: price
    params: {min: 0, max: 100000, boundary_mode: inclusive}
