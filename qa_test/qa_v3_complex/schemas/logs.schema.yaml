version: 2
id: logs
name: logs
description: 日志表（JSONL 源）
source:
  mode: relative_file
  path: data/logs.jsonl
columns:
  - {id: log_id, name: log_id, type: integer, primary_key: true, nullable: false}
  - {id: timestamp, name: timestamp, type: string}
  - {id: level, name: level, type: string}
  - {id: message, name: message, type: string}
