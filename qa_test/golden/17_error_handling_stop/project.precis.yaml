version: 2
project:
  id: golden-17-error-handling-stop
  name: "Golden 17 Error Handling Stop"
settings:
  validation:
    auto_validate: true
    strict_mode: false
    error_handling: stop
    timeout_seconds: 30
    batch_max_files: 100
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ','
  script_security:
    allow_eval: false
    allow_exec: false
    sandbox_mode: true
    timeout_seconds: 10
schemas:
  - id: users
    path: schemas/users.schema.yaml
constraints:
  - id: users_name_not_null
    path: constraints/users_name_not_null.constraint.yaml
  - id: users_age_not_null
    path: constraints/users_age_not_null.constraint.yaml
data_sources:
  - id: primary
    path: data
    mode: relative
    description: 主数据目录
