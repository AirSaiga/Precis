version: 2
project:
  id: golden-04-allowed-values
  name: "Golden 04 AllowedValues"
settings:
  validation:
    auto_validate: true
    strict_mode: false
    error_handling: continue
    timeout_seconds: 30
    batch_max_files: 100
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ','
  script_security:
    allow_eval: false
    allow_exec: false
    sandbox_mode: true
    timeout_seconds: 10
schemas:
  - id: orders
    path: schemas/orders.schema.yaml
constraints:
  - id: orders_status_allowed
    path: constraints/orders_status_allowed.constraint.yaml
data_sources:
  - id: primary
    path: data
    mode: relative
    description: 主数据目录
