version: 2
project:
  id: golden-09-scripted
  name: "Golden 09 Scripted"
settings:
  validation:
    auto_validate: true
    strict_mode: false
    error_handling: continue
    timeout_seconds: 30
    batch_max_files: 100
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ','
  script_security:
    # Scripted 约束需 allow_eval=true 才会执行
    allow_eval: true
    allow_exec: false
    sandbox_mode: false
    timeout_seconds: 10
schemas:
  - id: users
    path: schemas/users.schema.yaml
constraints:
  - id: users_score_limit
    path: constraints/users_score_limit.constraint.yaml
data_sources:
  - id: primary
    path: data
    mode: relative
    description: 主数据目录
