# ============================================================
# Transform: normalize_status
# 类型: UpperCase
# 说明: 将 orders.status 原地转为大写（output_columns 与 input_column 同名，
#       DAG 执行器走"整表替换"分支，将 status 改写为大写）。
#       下游 AllowedValues 约束（允许 PENDING/SHIPPED）由此通过——
#       若 transform 未执行，原始小写值将全部触发违规。
# ============================================================

version: 2

id: normalize_status
name: 状态标准化
type: UpperCase
enabled: true
description: 将 orders.status 原地转为大写

input_from_node: orders
input_column: status
output_columns:
  - status
