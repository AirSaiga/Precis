version: 2

id: users
name: users
description: 黄金案例 16 JSON 源测试表（顶层数组；部分 name 为 null 触发 NotNull）

source:
  mode: relative_file
  path: data/users.json
  options:
    format: array

columns:
  - id: id
    name: id
    type: integer
    primary_key: true
    nullable: false
  - id: name
    name: name
    type: string
