version: 2
project:
  id: qa_simple
  name: QA 测试工程（统一测试集）
settings:
  validation:
    auto_validate: true
    strict_mode: false
    error_handling: continue
    timeout_seconds: 30
    batch_max_files: 100
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ','
  script_security:
    # 为演示 Scripted 约束，允许执行受限脚本表达式
    allow_eval: true
    allow_exec: false
    sandbox_mode: false
    timeout_seconds: 10
schemas:
# --- 原 qa_simple 核心 schema ---
- id: users
  path: schemas/users.schema.yaml
- id: orders
  path: schemas/orders.schema.yaml
# --- 复杂 schema（多表、JSON 源、JSONL 源、外键）---
- id: users-users
  path: schemas/users-users.schema.yaml
- id: customers
  path: schemas/customers.schema.yaml
- id: categories
  path: schemas/categories.schema.yaml
- id: inventory
  path: schemas/inventory.schema.yaml
- id: orders-csv
  path: schemas/orders-csv.schema.yaml
- id: employees
  path: schemas/employees.schema.yaml
- id: order_items
  path: schemas/order_items.schema.yaml
- id: products
  path: schemas/products.schema.yaml
- id: releases
  path: schemas/releases.schema.yaml
- id: logs
  path: schemas/logs.schema.yaml
constraints:
# --- 原 qa_simple 独立约束 ---
- id: orders_amount_range
  path: constraints/orders_amount_range.constraint.yaml
- id: users_birth_date_check
  path: constraints/users_birth_date_check.constraint.yaml
- id: users_username_ascii
  path: constraints/users_username_ascii.constraint.yaml
- id: users_conditional_id_card
  path: constraints/users_conditional_id_card.constraint.yaml
- id: users_phone_format
  path: constraints/users_phone_format.constraint.yaml
- id: users_email_composite
  path: constraints/users_email_composite.constraint.yaml
# --- 模板展开后独立持久化的约束 ---
- id: users_name_required__check_not_null
  path: constraints/users_name_required__check_not_null.constraint.yaml
- id: users_age_range_tmpl__check_range
  path: constraints/users_age_range_tmpl__check_range.constraint.yaml
- id: users_country_normalize__check_allowed
  path: constraints/users_country_normalize__check_allowed.constraint.yaml
# --- 故意引用不存在的表（触发引用完整性警告）---
- id: orders_fk_ghost
  path: constraints/orders_fk_ghost.constraint.yaml
regex_nodes:
# --- 原 qa_simple 正则 ---
- id: extract_email_domain
  path: regex_nodes/extract_email_domain.regex.yaml
# --- 复杂正则（17 个）---
- id: regex_01
  path: regex_nodes/regex_01.regex.yaml
- id: regex_02
  path: regex_nodes/regex_02.regex.yaml
- id: regex_03
  path: regex_nodes/regex_03.regex.yaml
- id: regex_04
  path: regex_nodes/regex_04.regex.yaml
- id: regex_05
  path: regex_nodes/regex_05.regex.yaml
- id: regex_06
  path: regex_nodes/regex_06.regex.yaml
- id: regex_07
  path: regex_nodes/regex_07.regex.yaml
- id: regex_08
  path: regex_nodes/regex_08.regex.yaml
- id: regex_09
  path: regex_nodes/regex_09.regex.yaml
- id: regex_10
  path: regex_nodes/regex_10.regex.yaml
- id: regex_11
  path: regex_nodes/regex_11.regex.yaml
- id: regex_12
  path: regex_nodes/regex_12.regex.yaml
- id: regex_13
  path: regex_nodes/regex_13.regex.yaml
- id: regex_14
  path: regex_nodes/regex_14.regex.yaml
- id: regex_15
  path: regex_nodes/regex_15.regex.yaml
- id: regex_16
  path: regex_nodes/regex_16.regex.yaml
- id: regex_users-users_email
  path: regex_nodes/regex_users-users_email.regex.yaml
transforms:
- id: normalize_status
  path: transforms/normalize_status.transform.yaml
# --- 模板展开后独立持久化的转换 ---
- id: users_country_normalize__normalize
  path: transforms/users_country_normalize__normalize.transform.yaml
data_sources:
- id: primary
  path: data
  mode: relative
  description: 主数据目录
templates:
# --- 原 qa_simple 模板 ---
- id: required_field
  path: templates/required_field.template.yaml
- id: numeric_range
  path: templates/numeric_range.template.yaml
- id: normalize_enum
  path: templates/normalize_enum.template.yaml
# --- 复杂模板（参数化模板、多节点 DAG）---
- id: age_check
  path: templates/age_check.template.yaml
- id: user_quality_check
  path: templates/user_quality_check.template.yaml
template_instances:
# --- 原 qa_simple 模板实例 ---
- id: users_name_required
  template_id: required_field
  enabled: true
- id: users_age_range_tmpl
  template_id: numeric_range
  enabled: true
- id: users_country_normalize
  template_id: normalize_enum
  enabled: true
# --- 复杂模板实例 ---
- id: 19dcc6f3-c8ca-4487-8f61-9ba9f1fa2ce6
  template_id: age_check
  enabled: true
  params:
    source_column: age
    min_age: 18
    max_age: 100
  input_from_node: users-users
- id: a3e7b2c1-5d4e-4f8a-9b6c-1d2e3f4a5b6c
  template_id: user_quality_check
  enabled: true
  params:
    age_column: age
    email_column: email
    min_age: 0
    max_age: 150
    gender_column: status
  input_from_node: users-users
patterns_dir: patterns
warnings: []
