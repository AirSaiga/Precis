# ============================================================
# Template: normalize_enum 标准化后枚举检查
# ============================================================
# 多节点链式模板：先对输入列执行 UpperCase 转换，
# 再对转换结果执行 AllowedValues 约束。
# 演示模板内部节点引用（manualData → transform → constraint）。
# ============================================================

version: 2

id: normalize_enum
name: 标准化后枚举检查
description: 将字符串列转为大写后校验枚举值

nodes:
  - id: md_input
    kind: manualData
    type: ManualData
    column_name: text_field
    column_data_type: string
    rows:
      - ["cn"]
      - ["us"]
      - ["uk"]
    enabled: true
    description: 输入数据（连接 Schema 列注入真实数据）

  - id: normalize
    kind: transform
    type: UpperCase
    input_from_node: md_input
    input_column: text_field
    output_columns:
      - text_upper
    params: {}
    enabled: true
    description: 将输入列转为大写

  - id: check_allowed
    kind: constraint
    type: AllowedValues
    input_from_node: normalize
    input_column: text_upper
    refs:
      table_id: normalize
      column_id: text_upper
    params:
      allowed_values:
        - CN
        - US
        - UK
        - JP
    enabled: true
    description: 校验标准化后的枚举值
