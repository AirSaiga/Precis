# ============================================================
# Constraint: users_phone_format
# 类型: Scripted
# 说明: 手机号必须是 11 位数字且以 1 开头
# 注意: 需要项目 settings.script_security.allow_eval=true 才会执行
# ============================================================

version: 2

id: users_phone_format
type: Scripted
enabled: true
description: 手机号必须是 11 位数字且以 1 开头

refs:
  table_id: users
  column_id: phone

params:
  name: phone_format_check
  expression: 're_match(r"^1[3-9]\d{9}$", str(value))'
