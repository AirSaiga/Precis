# ============================================================
# Pattern: semver
# 说明: 语义化版本号表达式，用于 releases.version 的 Expr 类型验证
#       同时提供 major/minor/patch 三个命名捕获组，供 Extracted 列使用
# ============================================================

name: semver
regex: '^v(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)$'
output:
  type: semver
  major: "{major:int}"
  minor: "{minor:int}"
  patch: "{patch:int}"
