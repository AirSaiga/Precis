<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Precis</title>
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div class="card" id="card">
    <div class="glow-orb"></div>
    <div class="logo">P</div>
    <div class="title">Precis</div>
    <div class="status-block">
      <!-- 默认显示 initializing 状态(渐进降级:收不到 IPC 也有内容) -->
      <div class="status-zh" id="status-zh">
        <span class="spinner" id="spinner"></span>
        <span id="status-zh-text">正在初始化应用</span>
      </div>
      <div class="status-en" id="status-en">Initializing application</div>
    </div>
    <div class="bar-track"><div class="bar-fill"></div></div>
    <div class="version" id="version"></div>
  </div>
  <script src="splash.js"></script>
</body>
</html>
