<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Precis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .card {
      width: 320px;
      height: 200px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.04),
        0 4px 12px rgba(0, 0, 0, 0.06),
        0 16px 48px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #4a90d9 0%, #3a7bc8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(74, 144, 217, 0.3);
    }

    .logo svg {
      width: 28px;
      height: 28px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: #1d1d1f;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #86868b;
      letter-spacing: 0.2px;
      margin-bottom: 24px;
    }

    .loader {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4a90d9;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h16v16H4z" fill="white" opacity="0.2" rx="4"/>
        <path d="M7 9h10M7 12.5h7M7 16h8.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="17" cy="16" r="2.5" fill="white" opacity="0.9"/>
        <path d="M16 16l0.8 0.8 1.4-1.4" stroke="#4a90d9" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">Precis</div>
    <div class="subtitle">Data Validation Tool</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
