<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Precis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #f0f4f9 0%, #e4ecf5 100%);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: scale(0.92) translateY(8px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: linear-gradient(145deg, #5b9ee0 0%, #3574c4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow:
        0 2px 6px rgba(74, 144, 217, 0.25),
        0 8px 16px rgba(74, 144, 217, 0.15);
      animation: logoEnter 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    @keyframes logoEnter {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .logo svg {
      width: 26px;
      height: 26px;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
      animation: textEnter 0.4s ease-out 0.25s both;
    }

    .subtitle {
      font-size: 11.5px;
      color: #999;
      letter-spacing: 0.3px;
      margin-bottom: 28px;
      font-weight: 400;
      animation: textEnter 0.4s ease-out 0.3s both;
    }

    @keyframes textEnter {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .progress-track {
      width: 80px;
      height: 3px;
      background: #f0f0f0;
      border-radius: 2px;
      overflow: hidden;
      animation: textEnter 0.4s ease-out 0.4s both;
    }

    .progress-bar {
      width: 28px;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, #5b9ee0, #3574c4);
      animation: slide 1.6s ease-in-out infinite;
    }

    @keyframes slide {
      0%   { transform: translateX(-28px); }
      50%  { transform: translateX(80px); }
      100% { transform: translateX(-28px); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h16v16H4z" fill="white" opacity="0.2" rx="4"/>
        <path d="M7 9h10M7 12.5h7M7 16h8.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="17" cy="16" r="2.5" fill="white" opacity="0.9"/>
        <path d="M16 16l0.8 0.8 1.4-1.4" stroke="#4a90d9" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="title">Precis</div>
    <div class="subtitle">Data Validation Tool</div>
    <div class="progress-track">
      <div class="progress-bar"></div>
    </div>
  </div>
</body>
</html>
