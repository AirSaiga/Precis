name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # 强制 GitHub Actions 使用 Node.js 24 运行 action，消除 Node 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Type check
        run: npm run type-check

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build-only

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check app

      - name: Ruff format check
        run: python -m ruff format --check app

      - name: mypy type check
        run: python -m mypy app

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit --desc --format=markdown

      - name: Run unit + integration tests with coverage
        run: python -m pytest --cov=app --cov-fail-under=67 --cov-report=html --cov-report=term-missing

      - name: Golden-check CLI validate against qa_simple
        run: python -B -m scripts.qa_simple_golden_check

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

      - name: Verify frontend codegen in sync
        # 校验 frontend/src/types/generated/actions.ts 与后端 registry 一致。
        # codegen.mjs 仅用 node 内置模块,无需 npm install。
        # 后端依赖已在上一步安装,registry 可 import。
        run: |
          node ../frontend/scripts/codegen.mjs
          if ! git diff --exit-code ../frontend/src/types/generated/; then
            echo "::error::前端 codegen 产物与后端 registry 不同步,请跑 'npm run codegen' 后提交"
            git diff -- ../frontend/src/types/generated/
            exit 1
          fi

  electron:
    name: Electron Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

  encoding-check:
    name: Script Encoding Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 确保 .ps1 脚本均为 UTF-8（无 BOM）。
      # 历史上 enable-dev-mode.ps1 曾因 GBK 字节被当 UTF-8 读导致中文乱码（mojibake），
      # 此检查防止同类问题重现。PowerShell 5.1+ 与跨平台工具链均兼容无 BOM UTF-8。
      - name: Check .ps1 files are UTF-8 without BOM
        run: |
          set -e
          fail=0
          for f in $(git ls-files '*.ps1'); do
            # file --mime-encoding 对纯 ASCII 报 us-ascii，对 UTF-8 报 utf-8，两者都是合法 UTF-8 子集
            enc=$(file --mime-encoding "$f" | sed 's/.*: //')
            case "$enc" in
              utf-8|us-ascii)
                # 合法：UTF-8 或纯 ASCII（后者是 UTF-8 子集）
                ;;
              *)
                echo "::error::$f 编码为 $enc，应为 UTF-8"
                fail=1
                ;;
            esac
            # 检查 BOM（EF BB BF）：PowerShell 跨工具链兼容性要求无 BOM
            if head -c 3 "$f" | grep -q $'\xEF\xBB\xBF'; then
              echo "::error::$f 含有 BOM，应为无 BOM 的 UTF-8"
              fail=1
            fi
          done
          exit $fail

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: |
          cd ../frontend
          npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Python for backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd ../backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start backend server
        run: |
          cd ../backend
          python -m uvicorn app.api.main:app --host 0.0.0.0 --port 18000 &
          # 写入 .backend-port，供 Vite 代理（dynamic-backend-proxy）发现后端端口。
          # e2e 直接用 uvicorn 启动（不走 start_server.py，后者才会自动写端口文件），
          # 不写此文件会导致前端 dev server 代理返回 502，UI 测试无法访问后端。
          echo 18000 > ../backend/.backend-port
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18000/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Start frontend dev server
        run: |
          cd ../frontend
          npm run dev &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done
          echo "Frontend failed to start"
          exit 1

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: 'http://localhost:5173'
          E2E_BACKEND_URL: 'http://localhost:18000'
          E2E_SKIP_WEB_SERVER: 'true'

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7

  electron-package:
    name: Electron Package (Windows)
    runs-on: windows-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build-only

      - name: Install electron dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc

      - name: Package (directory)
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
        run: npx electron-builder --dir --win --publish never

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-win-package
          path: electron/release/
          retention-days: 7

  electron-package-mac:
    name: Electron Package (macOS)
    runs-on: macos-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build-only

      - name: Install electron dependencies
        run: npm ci

      - name: TypeScript compile
        run: npx tsc

      - name: Package (DMG)
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --config.mac.identity=null --publish never

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac-package
          path: electron/release/
          retention-days: 7

  electron-smoke:
    name: Electron Smoke (Windows packaged)
    runs-on: windows-latest
    needs: [electron-package]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Electron package artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-win-package
          path: electron/release/

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      - name: Set Electron executable path
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path electron/release/win-unpacked -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) { throw "未找到 Electron 可执行文件 in electron/release/win-unpacked" }
          Write-Host "找到 Electron 可执行文件: $($exe.FullName)"
          echo "E2E_ELECTRON_PATH=$($exe.FullName)" >> $env:GITHUB_ENV

      - name: Run Electron smoke tests
        working-directory: e2e
        run: npx playwright test --config=playwright.electron.config.ts

      - name: Upload smoke results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electron-smoke-results
          path: e2e/test-results/
          retention-days: 7


