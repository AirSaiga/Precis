name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # 强制 GitHub Actions 使用 Node.js 24 运行 action，消除 Node 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build-only

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check app

      - name: Ruff format check
        run: python -m ruff format --check app

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit --desc --format=markdown

      - name: Run unit + integration tests with coverage
        run: python -m pytest --cov=app --cov-fail-under=55 --cov-report=html --cov-report=term-missing

      - name: Smoke test CLI validate against real fixture
        # 验证 cli:validate 脚本能针对 qa_test/qa_simple 真实项目端到端通过
        # 这是 CLI 在 CI 环境（headless、无交互）下工作的最低保障
        run: |
          cd ..
          python -B -m app.cli validate \
            --manifest qa_test/qa_simple/project.precis.yaml \
            --data-directory qa_test/qa_simple/data

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 7

  electron:
    name: Electron Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: electron
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check
        run: npx tsc --noEmit

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Python for backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          cd ../backend
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Start backend server
        run: |
          cd ../backend
          python -m uvicorn app.main:app --port 18000 &
          sleep 5
        env:
          E2E_SKIP_WEB_SERVER: 'true'

      - name: Run E2E tests
        run: npx playwright test
        env:
          E2E_BASE_URL: 'http://localhost:5173'
          E2E_BACKEND_URL: 'http://localhost:18000'
          E2E_SKIP_WEB_SERVER: 'true'

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: e2e/test-results/
          retention-days: 7
