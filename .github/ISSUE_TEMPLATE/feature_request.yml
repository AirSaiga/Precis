name: Feature Request / 功能请求
description: Suggest an idea for Precis / 为 Precis 提出建议
description: Suggest an idea for Precis / 为 Precis 提出建议
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        👋 感谢你的关注！Precis 目前处于**超早期原型阶段**。

        👋 Thanks for your interest! Precis is currently in **ultra-early prototype stage**.

        我们**接受**功能建议，但请理解：超早期阶段架构不稳定，部分功能可能因重构调整或被放弃。

        We **accept** feature suggestions, but please understand: during this ultra-early stage the architecture is unstable, and some features may be adjusted or dropped due to refactoring.

  - type: textarea
    id: problem
    attributes:
      label: 问题与动机 / Problem & Motivation
      description: |
        你的功能请求与什么问题相关？请描述。
        Is your feature request related to a problem? Please describe.
      placeholder: "我希望 Precis 能够... / I wish Precis could..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案 / Proposed Solution
      description: 清晰简洁地描述你希望发生什么 / A clear description of what you want to happen
      placeholder: "如果能实现 XX 就太棒了... / It would be great if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives
      description: 你考虑过哪些替代方案？/ What alternative solutions have you considered?
      placeholder: "我也考虑过... / I also thought about..."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: 相关领域 / Area
      description: 这与项目的哪部分相关？/ Which part of the project does this relate to?
      options:
        - 可视化编辑器 / Visual Editor (Canvas)
        - 校验引擎 / Validation Engine
        - CLI
        - 后端 API / Backend API
        - Electron 桌面端 / Electron Desktop
        - 配置文件 / Configuration (YAML)
        - AI / LLM 集成 / AI / LLM Integration
        - 文档 / Documentation
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息 / Additional Context
      description: 在此处添加任何其他上下文、截图或参考 / Add any other context, screenshots, or references
    validations:
      required: false
