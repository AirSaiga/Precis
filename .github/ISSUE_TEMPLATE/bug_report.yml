name: Bug Report / Bug 报告
description: Report a bug to help us improve / 报告 Bug 以帮助我们改进
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **注意 / Note：Precis 目前处于 Alpha 阶段，稳定性仍在打磨，可能存在已知问题。**

        我们**接受** Bug 报告，但请理解部分边界场景尚未完全稳定，部分问题会在持续打磨中逐步解决。

        We **accept** bug reports, but please understand some edge cases are not yet fully stable; some issues may be resolved gradually as we continue polishing.

        如果你发现的是**安全漏洞**，请勿公开提交，请通过 GitHub Security Advisories 私下报告。

        If you discover a **security vulnerability**, please do not report it publicly; submit privately via GitHub Security Advisories.

  - type: textarea
    id: description
    attributes:
      label: Bug 描述 / Description
      description: 清晰简洁地描述 Bug 是什么 / A clear and concise description of what the bug is
      placeholder: "当我执行 X 时，发生了 Y，而不是 Z... / When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤 / Steps to Reproduce
      description: 复现该行为的步骤 / Steps to reproduce the behavior
      placeholder: |
        1. 打开 '...' / Go to '...'
        2. 点击 '...' / Click on '...'
        3. 滚动到 '...' / Scroll down to '...'
        4. 看到错误 / See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为 / Expected Behavior
      description: 清晰简洁地描述你期望发生什么 / A clear description of what you expected to happen
      placeholder: "我期望 X 发生，因为... / I expected X to happen because..."
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / Screenshots
      description: 如果适用，添加截图以帮助解释你的问题 / If applicable, add screenshots
    validations:
      required: false

  - type: dropdown
    id: entry-point
    attributes:
      label: 使用入口 / Entry Point
      description: 你如何使用 Precis？/ How are you using Precis?
      options:
        - Electron 桌面版 / Desktop App
        - CLI
        - 后端 API / Backend API
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息 / Environment
      description: |
        请提供你的环境详情 / Please provide your environment details
      value: |
        - 操作系统 OS:
        - Precis 版本 Version:
        - Node.js 版本:
        - Python 版本:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息 / Additional Context
      description: 在此处添加关于问题的任何其他上下文 / Add any other context
    validations:
      required: false
