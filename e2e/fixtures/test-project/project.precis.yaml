version: 2
project:
  id: transform-validate
  name: Transform Validate
settings:
  validation:
    auto_validate: true
    strict_mode: false
    error_handling: continue
    timeout_seconds: 30
    batch_max_files: 100
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ','
  script_security:
    allow_eval: false
    allow_exec: false
    sandbox_mode: true
    timeout_seconds: 10
schemas:
- id: sc_users
  path: schemas/users.schema.yaml
constraints:
- id: c-notnull-name
  path: constraints/c-notnull-name.constraint.yaml
regex_nodes:
- id: r-email
  path: regex/r-email.regex.yaml
transforms:
- id: t-strip
  path: transforms/t-strip.transform.yaml
data_sources: []
templates: []
template_instances: []
patterns_dir: patterns
warnings: []
