project:
  id: e2e-test-project
  name: E2E Test Project
  version: "2.0"

settings:
  validation:
    timeout_seconds: 30
    error_handling: continue
    strict_mode: false
  file_processing:
    default_encoding: utf-8
    csv_delimiter: ","
  script_security:
    allow_unsafe_eval: false

schemas:
  - id: users
    file: schemas/users.schema.yaml

constraints: []
